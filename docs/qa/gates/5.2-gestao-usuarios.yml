top_issues:
  - id: M-1
    severity: medium
    title: 'supabaseAdmin.auth.admin.listUsers() loads ALL auth users cross-tenant'
    status: OPEN
    location: 'story-5.2, Dev Notes — Ultimo Login Derivation, lines 188-200'
    description: |
      The suggested implementation calls `supabaseAdmin.auth.admin.listUsers()` which returns ALL auth users across ALL tenants (Supabase Admin API is not tenant-scoped).
      Then does O(n^2) matching: `authUsers.find(au => au.id === u.id)` for each user.
      For a multi-tenant system with 10K+ total users, this loads all users into memory and performs expensive lookups.
    recommendation: |
      @dev should:
      1. Use `supabaseAdmin.auth.admin.getUserById(id)` per-user (batched) for the current page only, OR
      2. Build a Map<string, AuthUser> from listUsers() for O(1) lookups, OR
      3. Store last_sign_in_at in the public.users table via auth webhook trigger (best long-term solution)
      Option 3 is recommended for scalability — avoids cross-tenant data loading entirely.
    suggested_owner: dev

  - id: L-1
    severity: low
    title: 'service_role client used for role changes — more permissive than needed'
    status: OPEN
    location: 'story-5.2, RLS Policies section, line 252'
    description: 'Story notes "Invite + role change API uses service_role client to bypass RLS". For invite this is correct (needs to create auth.users entry), but for role changes the users_admin_update RLS policy should suffice with the authenticated admin client.'
    recommendation: 'Use authenticated Supabase client for role changes (RLS allows admin/manager). Reserve service_role for invite operations only.'
    suggested_owner: dev

