top_issues:
  - id: L-1
    severity: low
    title: 'photo_url Zod validation allows any URL'
    status: OPEN
    location: 'story-5.3, Dev Notes — OnboardingPayload, line 176'
    description: 'Zod schema uses `z.string().url().optional()` for photo_url which allows any valid URL. Since photo is uploaded to Supabase Storage, the URL should be restricted to Supabase Storage domain to prevent avatar URL spoofing (e.g., setting avatar to an external tracking pixel).'
    recommendation: '@dev should validate photo_url starts with the Supabase Storage URL pattern or is empty. Example: `z.string().url().startsWith(process.env.NEXT_PUBLIC_SUPABASE_URL).optional()`'
    suggested_owner: dev

  - id: L-2
    severity: low
    title: 'Step 5 labels hardcoded in task — should reference MODE_LABELS (cross-story with 5.4)'
    status: OPEN
    location: 'story-5.3, Task 8 (StepSector), lines 126-129'
    description: |
      Task 8 hardcodes labels: "Setor/Area" (corporate) and "Curso/Periodo" (university).
      Story 5.4 defines MODE_LABELS.onboarding_step5 with these exact labels.
      AC4 of Story 5.4 mandates "nenhuma string hardcoded".
      If Story 5.3 is implemented first (P1 before P2), these strings become hardcoded.
    recommendation: '@dev should import labels from MODE_LABELS.onboarding_step5 during Story 5.3 implementation, OR Story 5.4 Task 5 grep list should include "Setor/Area" and "Curso/Periodo" to catch them during refactoring.'
    suggested_owner: dev

