findings:
  critical:
    - id: "6.4-H-1"
      story: "6.4"
      severity: CRITICAL
      title: "enrollments.deleted_at column missing from migration"
      description: |
        Task 5 references `UPDATE enrollments SET deleted_at = NOW() WHERE student_id = :userId`
        but the migration (Task 1) only adds `deleted_at` to the `users` table.
        Verified: enrollments schema has NO deleted_at column.
        The migration MUST also include: ALTER TABLE enrollments ADD COLUMN deleted_at TIMESTAMPTZ DEFAULT NULL;
      owner: "@sm"
      action: "Add enrollments.deleted_at to migration 20260208000002 and update Task 1"

  should_fix:
    - id: "6.2-M-1"
      story: "6.2"
      severity: MEDIUM
      title: "dashboard/page.tsx missing from Tasks"
      description: |
        Dev Notes correctly document that dashboard/page.tsx passes `tenantMode` prop to
        StudentDashboard, TeacherDashboard, and ManagerDashboard. But there is no explicit Task
        or subtask to update this file. Only Task 5 mentions "remover prop tenantMode" on the
        dashboard components, without listing page.tsx as a file to modify.
      owner: "@sm"
      action: "Add subtask to Task 5: update dashboard/page.tsx to stop passing tenantMode prop"

    - id: "6.2-M-2"
      story: "6.2"
      severity: MEDIUM
      title: "Admin dashboard inline JSX not in component list"
      description: |
        The admin dashboard (dashboard/page.tsx lines 84-155) renders inline JSX that may
        contain mode-aware labels. It is NOT one of the 12 listed components but should be
        checked during the grep phase (Task 12).
      owner: "@sm"
      action: "Add note to Task 12: include dashboard/page.tsx in grep scope"

    - id: "6.3-M-1"
      story: "6.3"
      severity: MEDIUM
      title: "Rate limiting sequencing contradicts auth dependency"
      description: |
        Task 2 says "rate limit checks ANTES da autenticacao" but user-based rate limits
        (chat, courses, privacy) REQUIRE userId from auth. The middleware already calls
        supabase.auth.getUser() early. Correct sequence should be:
        1. IP-based limits (auth endpoints) — before auth
        2. supabase.auth.getUser() — get identity
        3. User-based limits (chat, courses, privacy) — after auth
      owner: "@sm"
      action: "Clarify Task 2: IP-based limits before auth, user-based limits after auth"

    - id: "6.3-M-2"
      story: "6.3"
      severity: MEDIUM
      title: "Middleware matcher change side effects undocumented"
      description: |
        Removing |api/ from the matcher means middleware now runs for ALL API routes.
        This means supabase.auth.getUser() runs on every API request (adds latency).
        The current protected paths check (["/dashboard", "/courses", "/admin", "/analytics"])
        won't cause API redirects, but the auth call overhead should be documented.
        Consider: selective rate limiting only (skip auth for non-rate-limited routes).
      owner: "@sm"
      action: "Add risk note about middleware running on all API routes and auth overhead"

    - id: "6.4-M-1"
      story: "6.4"
      severity: MEDIUM
      title: "SUPABASE_SERVICE_ROLE_KEY not documented in env requirements"
      description: |
        Task 5 uses supabaseAdmin with SUPABASE_SERVICE_ROLE_KEY for auth.admin.updateUserById().
        This env var is not listed in Story Context or Tasks. Dev agent needs to know this
        env var must exist.
      owner: "@sm"
      action: "Add env var documentation to Task 5 or create subtask for env setup"

    - id: "6.4-M-2"
      story: "6.4"
      severity: MEDIUM
      title: "RLS policy update scope unclear"
      description: |
        Task 3 says 'add AND deleted_at IS NULL to SELECT policies on users table' but
        does not list which specific RLS policies to update. Architecture mentions 28 granular
        policies. Dev needs clarity on which ones to modify.
      owner: "@sm"
      action: "List specific RLS policy names or provide pattern: all users_* SELECT policies"

  nice_to_have:
    - id: "6.1-L-1"
      story: "6.1"
      severity: LOW
      title: "shared/index.ts re-export path not in Task 5 subtasks"
      description: |
