review:
  epic: "Epic 7: Observabilidade & Qualidade"
  version: "1.1 (post-fix)"
  previous_version: "1.0"
  reviewer: "Quinn (QA Agent)"
  date: "2026-02-08"
  gate_decision: PASS
  previous_score: 78
  score: 90

finding_resolution_matrix:
  - id: "H-1"
    severity: HIGH
    title: "Architecture Section 18 specifies 5 monitoring tools — epic covers only 2"
    status: RESOLVED
    validation: |
      Architecture specifies: Vercel Analytics, Vercel Speed Insights, Sentry, PostHog, Custom Dashboard.

      Epic 7 v1.1 now covers:
      - Sentry (Story 7.1) ✓
      - PostHog (Story 7.2) ✓
      - Vercel Analytics + Speed Insights (Story 7.1 AC11) ✓ [NEW]
      - Custom Dashboard: documented as post-MVP, Sentry distributed tracing (AC7) covers partially ✓

      4 of 5 tools covered. Custom Dashboard deferred with rationale. Acceptable for MVP.

  - id: "H-2"
    severity: HIGH
    title: "E2E tests only on Chromium — PRD requires 4 browsers"
    status: RESOLVED
    validation: |
      PRD NFR12: "Chrome, Firefox, Safari e Edge (ultimas 2 versoes)"

      Playwright config now includes:
      - chromium (Desktop Chrome) ✓
      - firefox (Desktop Firefox) ✓
      - webkit (Desktop Safari) ✓
      Edge = Chromium engine, separate testing not needed ✓
      AC11 added: "E2E tests passam em Chromium, Firefox e WebKit" ✓

  - id: "H-3"
    severity: HIGH
    title: "NFR11 (LLM cost monitoring) not adequately addressed"
    status: RESOLVED
    validation: |
      PRD NFR11: "Custo de LLM por sessao socratica deve ser monitorado e otimizavel"

      Story 7.2 AC4 now includes pipeline_completed event with:
      - total_input_tokens ✓
      - total_output_tokens ✓
      - model ✓
      - retry_count ✓
      - estimated_cost_usd ✓

      This fully addresses NFR11 — LLM cost per session is now trackable in PostHog.

  - id: "M-1"
    severity: MEDIUM
    title: "Sentry env var naming inconsistency"
    status: RESOLVED
    validation: |
      AC6 now correctly lists:
      - NEXT_PUBLIC_SENTRY_DSN (client-side) ✓
      - SENTRY_DSN (server-side) ✓
      - SENTRY_AUTH_TOKEN (build-time) ✓
      - SENTRY_ORG + SENTRY_PROJECT (build config) ✓

  - id: "M-2"
    severity: MEDIUM
    title: "E2E test determinism strategy underspecified"
    status: RESOLVED
    validation: |
      AC10 now commits to MSW mock strategy:
      "Anthropic API mockado via MSW com fixtures pre-gravadas para cada agente
      (Analyst, Socrates, Editor, Tester) em tests/e2e/fixtures/"

      Strategy decided upfront. Determinism ensured.

  - id: "M-3"
    severity: MEDIUM
    title: "PostHog server-side tracking needs separate API key"
    status: RESOLVED
    validation: |
      AC6 now includes POSTHOG_API_KEY (server-side tracking) ✓
      Technical notes show posthog-node usage with separate key ✓

  - id: "M-4"
    severity: MEDIUM
    title: "E2E CI setup complexity underestimated"
    status: ACKNOWLEDGED
    validation: |
      PM acknowledged complexity but maintained SP=8.
      Residual risk: CI setup may take longer than estimated.
      Not blocking — team can adjust during sprint if needed.

  - id: "L-1"
    severity: LOW
    title: "Sentry replaysSessionSampleRate too low for MVP"
    status: NOTED
    validation: |
      QA gate resolution says "noted for adjustment to 0.1 in MVP" but the
      technical notes code sample still shows 0.01. Dev should update during
      implementation. Non-blocking — configuration value, easily changed.

  - id: "L-2"
    severity: LOW
    title: "PostHog capture_pageview may conflict with App Router"
    status: NOTED
    validation: |
      QA gate resolution recommends PostHogPageView component but technical
      notes still show capture_pageview: true. Dev should use official Next.js
      integration during implementation. Non-blocking — runtime behavior, easily changed.

residual_observations:
  - id: "INFO-1"
    severity: INFO
    title: "Epic version not updated in file header"
    note: |
      Epic file still says Version 1.0 and change log only has 1.0 entry.
      Fixes are present in the content but version metadata not bumped.
      Non-blocking.

  - id: "INFO-2"
    severity: INFO
    title: "Story 7.3 SP=8 may still be underestimated"
    note: |
      With cross-browser testing (3 browsers), MSW fixtures, CI Docker setup,
      and Supabase local, SP=8 is tight. Team should monitor velocity and
      consider splitting if falling behind.

  - id: "INFO-3"
    severity: INFO
    title: "L-1 and L-2 code samples not updated"
    note: |
      Technical notes code samples still show old values (replaysSessionSampleRate: 0.01,
      capture_pageview: true). Dev should use recommended values during implementation:
      - replaysSessionSampleRate: 0.1 for MVP
      - Use PostHogPageView component instead of auto-capture

