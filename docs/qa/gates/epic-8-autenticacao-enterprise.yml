summary: |
  Epic 8 is the most focused of the three, with clear scope and good Supabase alignment.
  However, two security-critical issues need addressing:

  - OAuth without tenant context creates unassociated users (H-1)
  - SAML role mapping from IdP enables privilege escalation (H-2)

  Story 8.1 (Google OAuth) is well-scoped but needs error state ACs (M-1) and
  clearer profile sync implementation (M-3).

  Story 8.2 (SAML SSO) has an unachievable AC (M-2: SAML SLO not supported by Supabase)
  that should be removed or deferred.

  2 HIGH, 3 MEDIUM, 2 LOW findings. H-1 and H-2 are security-critical and MUST
  be addressed before implementation.

