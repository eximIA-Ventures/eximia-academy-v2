    severity: CRITICAL
    title: "Retry-After calculava ~55 anos ao inves de segundos"
    location: "apps/web/src/middleware.ts:26"
    original_issue: |
      Upstash Ratelimit.limit() retorna { reset } como Unix timestamp em ms
      (quando a janela reseta). O codigo original fazia Math.ceil(reset / 1000),
      que retornava ~1.7 bilhao de segundos (~55 anos) como Retry-After.
    fix_applied: |
      Corrigido para: Math.max(1, Math.ceil((reset - Date.now()) / 1000))
      - Subtrai Date.now() para obter delta em ms
      - Divide por 1000 para converter em segundos
      - Math.max(1, ...) garante minimo de 1 segundo
      - Math.ceil arredonda para cima
    verified: true
    verified_by: "Quinn"

