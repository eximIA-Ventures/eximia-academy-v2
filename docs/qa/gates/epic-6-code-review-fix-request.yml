recommendations_applied:
  - id: "R-1"
    severity: LOW
    status: RESOLVED
    title: "Stored procedures com NULL safety apos LGPD anonymization"
    location: "supabase/migrations/20260207000000_initial_schema.sql (L218, L273)"
    issue: |
      As funcoes acquire_session_turn e release_session_turn usam:
        IF v_session.student_id != p_user_id THEN RAISE EXCEPTION ...

      Apos LGPD anonymization, student_id sera NULL. Em PostgreSQL,
      NULL != uuid avalia para NULL (falsy no IF), fazendo o check
      silenciosamente passar ao inves de rejeitar.

      Risco mitigado porque:
      1. Usuario deletado esta banido no Supabase Auth (876600h ban)
      2. Sessao anonimizada nao sera "active"
      3. Nenhum fluxo chama estas funcoes com user_id deletado

      Mesmo assim, defesa em profundidade recomenda correcao.
    recommendation: |
      Substituir != por IS DISTINCT FROM em ambas as funcoes:
        IF v_session.student_id IS DISTINCT FROM p_user_id THEN
          RAISE EXCEPTION 'Session does not belong to user';
        END IF;

      IS DISTINCT FROM trata NULL corretamente:
        NULL IS DISTINCT FROM 'uuid' → TRUE (levanta exception)
        'uuid1' IS DISTINCT FROM 'uuid2' → TRUE (levanta exception)
        'uuid1' IS DISTINCT FROM 'uuid1' → FALSE (passa)
    fix_applied: |
      Created migration 20260208000003_fix_session_null_safety.sql with
      CREATE OR REPLACE FUNCTION using IS DISTINCT FROM for both
      claim_session_turn and release_session_turn.
    files:
      - supabase/migrations/20260208000003_fix_session_null_safety.sql

  - id: "R-2"
    severity: MEDIUM
    status: RESOLVED
    title: "Adicionar testes unitarios para endpoints novos"
    location: "apps/web/src/app/api/privacy/, apps/web/src/lib/rate-limit.ts"
    issue: |
      Os seguintes modulos criados no Epic 6 nao possuem testes unitarios:
      1. rate-limit.ts — factory de limiters + fail-open pattern
      2. /api/privacy/export — data portability GET endpoint
      3. /api/privacy/delete — soft delete + anonymization + Auth ban

      Cenarios recomendados:
      - rate-limit.ts: createLimiter com/sem env vars, null limiter, Redis error handling
      - privacy/export: auth check, admin on-behalf-of, same tenant validation, full export payload
      - privacy/delete: confirm validation, admin flow, self-delete block, cascade order, ban failure logging
    fix_applied: |
      Created 3 test files with 19 total tests:
      - rate-limit.test.ts (3 tests): null when no env, creates when env set, 6 exports
      - delete.test.ts (11 tests): auth, confirm, admin flow, rpc, ban failure
      - export.test.ts (5 tests): auth, admin flow, tenant check, payload
      Also fixed vitest.config.ts alias (fileURLToPath) for accented path support.
    files:
      - apps/web/src/lib/__tests__/rate-limit.test.ts
      - apps/web/src/app/api/privacy/__tests__/export.test.ts
      - apps/web/src/app/api/privacy/__tests__/delete.test.ts
      - apps/web/vitest.config.ts

  - id: "R-3"
    severity: MEDIUM
    status: RESOLVED
    title: "LGPD delete sem transacao atomica"
    location: "apps/web/src/app/api/privacy/delete/route.ts"
    issue: |
      O endpoint executa 4 operacoes sequenciais:
      1. UPDATE sessions SET student_id = NULL
      2. UPDATE enrollments SET deleted_at = now
      3. UPDATE users SET deleted_at = now
      4. Auth ban (876600h)

      Se step 2 falha, step 1 ja executou (sessions anonimizadas mas enrollments intactas).
      Supabase JS client nao suporta transacoes nativas.

      Risco mitigado: cada step retorna erro individualmente e o estado parcial
      nao expoe PII (sessions ja anonimizadas). Pior caso e um estado inconsistente
      que pode ser corrigido re-executando o delete.
    fix_applied: |
      Created stored procedure lgpd_soft_delete_user in migration
      20260208000004_lgpd_soft_delete_procedure.sql. Updated delete endpoint
      to call supabase.rpc("lgpd_soft_delete_user") instead of sequential updates.
      All 3 steps (sessions anonymization, enrollments soft delete, user soft delete)
      now execute in a single PostgreSQL transaction.
    files:
      - supabase/migrations/20260208000004_lgpd_soft_delete_procedure.sql
      - apps/web/src/app/api/privacy/delete/route.ts

  - id: "R-4"
    severity: LOW
    status: DOCUMENTED
    title: "Epic 11 scope contamination no working tree"
    location: "Multiple files"
    issue: |
      O changeset do Epic 6 contem alteracoes de Epic 11 (super_admin role,
      whitelabel config, platformAuditLog). Estes changes geram:
      - 2 erros de typecheck (courses-page-client.tsx, missing super-admin component)
      - 3 erros de lint (super-admin files)

      Confirmado via git diff: nenhuma dessas alteracoes foi feita pelo Epic 6.
      Sao changes pre-existentes do user.
    recommendation: |
      Ao commitar Epic 6, separar em commits distintos:
      - Commit 1: Epic 6 changes only (Stories 6.1-6.4)
      - Commit 2: Epic 11 WIP (separate branch recomendado)

      Usar `git add -p` ou file-by-file staging para separar.
    files: []
    effort: "30 min"

