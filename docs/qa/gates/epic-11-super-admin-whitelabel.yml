# ============================================================
# FINDINGS
# ============================================================
findings:

  # --- HIGH SEVERITY ---

  - id: E11-H1
    severity: HIGH
    story: "11.4"
    title: "Super Admin accessing /admin/settings sees role check blocking access"
    description: |
      Story 11.4 AC4 says super admin can navigate to /admin/settings when
      in tenant context. However, the current admin settings page at
      apps/web/src/app/(platform)/admin/settings/page.tsx (line ~18)
      checks `if (profile.role !== 'admin')` and redirects.
      A super_admin with tenant context still has role='super_admin', NOT 'admin'.
      The role check will block super admin from seeing tenant settings.
    recommendation: |
      Update admin settings page role check to:
      `if (profile.role !== 'admin' && profile.role !== 'super_admin')`
      OR create a helper `isAdminOrSuperAdmin(role)`.
      Same fix needed in admin/users/page.tsx and any admin-only API routes.
      Document this in Story 11.4 Task 4 subtasks.
    owner: "@dev"

  - id: E11-H2
    severity: HIGH
    story: "11.1"
    title: "Missing super_admin RLS policies for content tables (courses, sessions, etc.)"
    description: |
      Story 11.1 only creates RLS policies for `tenants`, `users`, and
      `platform_audit_log`. When super admin enters tenant context (Story 11.4),
      they need to view courses, sessions, analytics, etc. The existing RLS
      policies on these tables use `auth_tenant_id()` which returns NULL for
      super_admin (since tenant_id IS NULL). Super admin in tenant context
      won't be able to see courses, chapters, sessions, enrollments, etc.
    recommendation: |
      Option A (Recommended): Add super_admin RLS policies to ALL 10 tables,
      not just tenants and users. Use: `USING (is_super_admin())`.
      Option B: Update `auth_tenant_id()` to return the active tenant from
      a custom claim/setting when super admin has active context.
      Either way, this is a BLOCKER for Story 11.4 functionality.
    owner: "@dev + @data-engineer"

  - id: E11-H3
    severity: HIGH
    story: "11.2"
    title: "getAuthProfile() tenant join returns empty for super_admin — breaks TenantProvider"
    description: |
      Current auth.ts does: `.select('*, tenants(id, name, slug, ...)')`.
      For super_admin with tenant_id=NULL, the tenants join returns null/empty.
      When super admin enters tenant context via cookie (Story 11.4), the
      auth profile still has no tenant data. TenantProvider expects tenant
      data or will crash/show empty state.
      Story 11.2 mentions this but doesn't specify HOW to resolve it.
      Story 11.4 says "TenantProvider loads from cookie" but no implementation
      detail on how getAuthProfile() or the layout integrates cookie-based
      tenant loading for super_admin.
    recommendation: |
      Add explicit implementation detail to Story 11.2 or 11.4:
      When super_admin has active cookie, getAuthProfile() should:
      1. Read x-sa-active-tenant cookie
      2. Fetch that tenant's data from DB
      3. Merge into profile response as if it were the user's tenant
      This logic should be in the platform layout.tsx, not in auth.ts
      (to keep auth.ts pure). Add a new function:
      `getSuperAdminTenantContext(cookieTenantId)` in super-admin-context.ts.
    owner: "@dev"

  - id: E11-H4
    severity: HIGH
    story: "11.3"
    title: "Tenant creation workflow missing status field initialization"
    description: |
      Story 11.3 CreateTenantPayload interface does not include a `status` field.
      The existing `tenants` table doesn't have a `status` column either — the
      migration in Story 11.1 doesn't add one. However, Story 11.3 AC11
      references "soft delete (desativar — status = inactive)" and the
      SuperAdminTenantsResponse includes `status: 'active' | 'inactive'`.
      There is no `status` column on the `tenants` table in the migration.
    recommendation: |
      Add to Story 11.1 migration:
      `ALTER TABLE tenants ADD COLUMN status TEXT DEFAULT 'active'
       CHECK (status IN ('active', 'inactive'));`
      Also add index: `CREATE INDEX idx_tenants_status ON tenants(status);`
      Update the Tenant type in packages/shared to include `status`.
    owner: "@dev"

  # --- MEDIUM SEVERITY ---

  - id: E11-M1
    severity: MEDIUM
    story: "11.6"
    title: "DOMPurify used for CSS sanitization but it's an HTML sanitizer"
    description: |
      Story 11.6 Dev Notes reference DOMPurify for CSS sanitization.
      DOMPurify is designed for HTML sanitization, not CSS.
      The actual implementation in sanitize-css.ts uses regex patterns,
      which is the correct approach. But the reference to DOMPurify in
      the story text is misleading and could confuse @dev during
      implementation.
    recommendation: |
      Remove DOMPurify reference from Story 11.6 Dev Notes.
      Keep the regex-based allowlist approach in sanitize-css.ts.
      Consider using a dedicated CSS sanitizer library like `css-tree`
      for more robust parsing if custom_css feature grows in complexity.
    owner: "@dev"

  - id: E11-M2
    severity: MEDIUM
    story: "11.3"
    title: "Slug auto-generation from tenant name may produce collisions with existing slugs"
    description: |
      Story 11.3 AC6 Step 1 auto-generates slug from name. The slugify
      utility handles diacritics and special chars, but doesn't handle
      collision avoidance (e.g., two companies named "Empresa ABC" would
      both generate slug "empresa-abc"). The DB UNIQUE constraint will
      reject the second, but UX should handle this gracefully.
    recommendation: |
      Add collision handling in slugify: if slug exists, append -2, -3, etc.
      Show real-time slug availability check (debounced API call) in the
      wizard Step 1 UI. Add this to Story 11.3 Task 3 subtasks.
    owner: "@dev"

  - id: E11-M3
    severity: MEDIUM
    story: "11.5"
    title: "Whitelabel form missing custom_css field from AC list"
    description: |
      Story 11.5 AC4 lists 7 form fields but does NOT include `custom_css`
      even though the WhitelabelConfig type includes it, Story 11.6 AC8
      references it, and the Zod schema in 11.5 includes it.
      The custom_css field is the highest-risk field (XSS) and deserves
      its own AC with explicit security requirements.
    recommendation: |
      Add AC11 to Story 11.5: "Campo custom_css (textarea, max 5000 chars)
      com sanitizacao obrigatoria antes de salvar. Preview mostra CSS
      sanitizado aplicado em tempo real."
      Alternatively, defer custom_css to a separate story (11.8) given
      the XSS risk — simpler fields first, CSS later with dedicated security review.
    owner: "@pm"

  - id: E11-M4
    severity: MEDIUM
    story: "Epic"
    title: "Missing screens.md update for 7+ new super admin screens"
    description: |
      Epic 11 introduces at least 7 new screens (tenant list, tenant detail,
      create wizard 3 steps, audit log, dashboard) but screens.md
      reference still points to existing "Telas 11, 12". New screens need
      formal screen definitions for @ux-design-expert and @dev reference.
    recommendation: |
      Create screen definitions in screens.md for:
      - Tela SA-1: Super Admin Dashboard
      - Tela SA-2: Tenant List
      - Tela SA-3: Create Tenant Wizard (3 steps)
      - Tela SA-4: Tenant Detail (3 tabs)
      - Tela SA-5: Audit Log
      - Tela SA-6: Whitelabel Settings Tab
      Add this as a prerequisite task before Story 11.3 implementation.
    owner: "@ux-design-expert"

  - id: E11-M5
    severity: MEDIUM
    story: "11.1"
    title: "Seed script super_admin UUID needs coordination with auth.users"
    description: |
      Story 11.1 AC13 says seed includes super_admin user. The existing
      seed.sql inserts into both auth.users and public.users with
      deterministic UUIDs. The super_admin insert must:
      1. Insert into auth.users first (with email/password)
      2. Insert into public.users with tenant_id=NULL
      The order matters due to FK constraint (users.id → auth.users.id).
      Also, the seed-remote.ts uses supabase.auth.admin.createUser()
      which auto-creates auth.users entry.
    recommendation: |
      Add explicit UUID constant for super_admin in seed files:
      `const SUPER_ADMIN_ID = '00000000-0000-0000-0000-000000000000'`
      Ensure auth.users insert includes password hash.
      Add to Story 11.1 Task 3 subtasks: verify FK ordering.
    owner: "@dev"

  # --- LOW SEVERITY ---

  - id: E11-L1
    severity: LOW
    story: "11.7"
    title: "Dashboard growth query may be slow on large datasets"
    description: |
      Story 11.7 dashboard uses GROUP BY date_trunc('month', created_at)
      across users and tenants tables. Without proper indexing on created_at,
      this could be slow with 100K+ users.
    recommendation: |
      Consider adding a partial index:
      `CREATE INDEX idx_users_created_month ON users(date_trunc('month', created_at))`
      Or use materialized view refreshed hourly for dashboard data.
      Not blocking — current scale doesn't require this.
    owner: "@data-engineer"

  - id: E11-L2
    severity: LOW
    story: "11.4"
    title: "Cookie name 'x-sa-active-tenant' uses x- prefix (deprecated in RFC 6648)"
    description: |
      RFC 6648 deprecated the x- prefix for custom headers/names.
      While this is for HTTP headers not cookies, consistency suggests
      using a non-prefixed name like 'sa-active-tenant' or 'sa_tenant'.
    recommendation: |
      Rename cookie to `sa_active_tenant` (underscore, no x- prefix).
      Minor cosmetic issue — doesn't affect functionality.
    owner: "@dev"

  - id: E11-L3
    severity: LOW
    story: "Epic"
    title: "Epic numbering gap (9, 10 missing)"
    description: |
      Existing epics go 1-8. This epic is numbered 11, leaving gaps at
      9 and 10. While not technically an issue, it may cause confusion
      about missing epics.
    recommendation: |
      Verify with @pm if epics 9 and 10 are planned or if this should
      be renumbered. If gap is intentional (reserved for future), document
      in roadmap. Not blocking.
    owner: "@pm"

